<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghosttrade</title>
  <link rel="stylesheet" href="tailwind.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 440px;
      margin: 0;
      padding: 0;
      background-color: #0A0A0A; /* Extremely deep, clean black */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #E5E7EB; /* Clean off-white */
    }
  </style>
</head>
<body class="antialiased selection:bg-emerald-500/30">
  
  <!-- Header -->
  <header class="sticky top-0 z-20 bg-[#0A0A0A]/80 backdrop-blur-md border-b border-white/10 px-5 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <!-- Minimalist Logo Icon -->
      <svg class="w-5 h-5 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h1 class="text-sm font-semibold tracking-wide text-white uppercase">Ghosttrade Engine</h1>
    </div>
    <div id="status-indicator" class="flex items-center gap-2">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span class="text-[10px] font-medium text-emerald-400 tracking-wider uppercase">Standby</span>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <main id="content-area" class="relative px-5 py-4 min-h-[200px] max-h-[500px] overflow-y-auto custom-scrollbar">
    
    <!-- Loading State -->
    <div id="loading-indicator" class="flex flex-col items-center justify-center py-12 gap-4">
      <div class="w-6 h-6 border-2 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin"></div>
      <div class="flex flex-col items-center">
        <span class="text-xs font-medium text-gray-400 tracking-widest uppercase">Initializing</span>
        <span class="text-sm text-gray-300 mt-1" id="loading-text">Extracting chart data...</span>
      </div>
    </div>

    <!-- AI Output Stream -->
    <div id="content" class="text-[13px] leading-relaxed text-gray-300 space-y-4 pb-4 hidden opacity-0 transition-opacity duration-300">
      <!-- Content will stream here -->
    </div>

    <!-- Deep Reasoning Toggle -->
    <div id="reasoning-container" class="hidden mt-4 pb-24 flex-col gap-3">
      <button id="toggle-reasoning-btn" class="w-full py-2.5 bg-[#111] hover:bg-[#1A1A1A] border border-white/10 rounded text-xs font-semibold tracking-wide text-emerald-400 uppercase transition-all flex items-center justify-center gap-2 shadow-[0_0_10px_rgba(16,185,129,0.05)]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
        View Deep Reasoning
      </button>
      
      <div id="reasoning-content" class="hidden p-4 bg-[#0A0A0A] border border-white/5 rounded-lg text-[12.5px] leading-relaxed text-gray-400 space-y-3 shadow-inner">
        <!-- Module 4 will stream here -->
      </div>
    </div>

  </main>

  <!-- Fixed Action Card (Hidden initially, shown when final verdict arrives) -->
  <div id="action-card" class="fixed bottom-0 left-0 w-full bg-[#111] border-t border-white/10 p-4 transform translate-y-full transition-transform duration-500 ease-out flex flex-col gap-3">
    <div class="flex items-center gap-2 mb-1">
      <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      <h3 class="text-xs font-bold text-white uppercase tracking-widest">Prediction Verdict</h3>
    </div>
    
    <div class="grid grid-cols-2 gap-3">
      <div class="bg-emerald-500/10 border border-emerald-500/20 rounded p-2 flex flex-col justify-center items-center">
        <span class="text-[10px] text-emerald-400 font-medium uppercase tracking-wider">Bullish</span>
        <span id="bullish-prob" class="text-lg font-bold text-white">-</span>
      </div>
      <div class="bg-red-500/10 border border-red-500/20 rounded p-2 flex flex-col justify-center items-center">
        <span class="text-[10px] text-red-400 font-medium uppercase tracking-wider">Bearish</span>
        <span id="bearish-prob" class="text-lg font-bold text-white">-</span>
      </div>
    </div>
    
    <div class="bg-[#1A1A1A] rounded p-3 mt-1 border border-white/5">
      <p id="action-summary" class="text-[11px] text-gray-300 leading-tight">Analyzing market structure...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
