<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghosttrade Engine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <header class="gt-header">
    <div class="gt-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h1>Ghosttrade</h1>
    </div>
    <div id="status-indicator" class="gt-status">
      <span class="gt-status-dot" id="status-dot">
        <span class="ping"></span>
        <span class="dot"></span>
      </span>
      <span class="gt-status-label" id="status-label">Standby</span>
    </div>
  </header>

  <!-- Main Scrollable Content -->
  <main id="content-area" class="gt-main custom-scrollbar">

    <!-- Loading State -->
    <div id="loading-indicator" class="gt-loading">
      <div class="gt-spinner"></div>
      <div style="text-align:center">
        <div class="gt-loading-label">Initializing</div>
        <div class="gt-loading-sub" id="loading-text">Extracting chart data...</div>
      </div>
    </div>

    <!-- AI Output Stream (Modules 1-3) -->
    <div id="content" class="gt-content hidden">
      <!-- Modules 1-3 stream here -->
    </div>

    <!-- WHY Button + Deep Reasoning Panel -->
    <div id="reasoning-container" class="gt-reasoning">

      <!-- WHY Button -->
      <button id="toggle-reasoning-btn" class="gt-why-btn">
        <div class="gt-why-btn-left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>WHY THIS PREDICTION?</span>
        </div>
        <svg class="gt-why-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </button>

      <!-- Reasoning Panel (visual cards inside) -->
      <div id="reasoning-content" class="gt-reasoning-panel">
        <!-- Module 4 data gets injected here as visual cards -->
      </div>
    </div>

  </main>

  <!-- Fixed Action Card -->
  <div id="shield-card" class="gt-shield-card">
    <div class="shield-header">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      SHIELD MODE ACTIVE
    </div>
    <div id="shield-reason" class="shield-reason">Analyzing market conditions...</div>
  </div>

  <div id="action-card" class="gt-action-card">
    <div class="gt-action-title">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      <h3>Prediction Verdict</h3>
    </div>

    <div class="gt-prob-grid">
      <div class="gt-prob-card bullish">
        <span class="gt-prob-label">Bullish</span>
        <span id="bullish-prob" class="gt-prob-value">-</span>
      </div>
      <div class="gt-prob-card bearish">
        <span class="gt-prob-label">Bearish</span>
        <span id="bearish-prob" class="gt-prob-value">-</span>
      </div>
    </div>

    <div class="gt-summary-box">
      <p id="action-summary">Analyzing market structure...</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
