<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sotix Options</title>
  <link rel="stylesheet" href="tailwind.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center font-sans p-6">
  <div class="max-w-md w-full bg-gray-900 border border-gray-800 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.6)] p-8">
    <div class="flex items-center gap-4 mb-8">
      <img src="icon48.png" alt="Sotix Logo" class="w-12 h-12">
      <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-200 bg-clip-text text-transparent">Sotix AI Nexus</h1>
    </div>
    
    <div class="space-y-6">
      <div>
        <label for="wsUrl" class="block text-sm font-medium text-gray-400 mb-2 uppercase tracking-wider">Backend WebSocket URL</label>
        <input type="text" id="wsUrl" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 font-mono text-sm transition-all shadow-inner placeholder-gray-600" placeholder="ws://localhost:5000/stream" value="ws://localhost:5000/stream">
        <p class="mt-2 text-xs text-gray-500">The connection endpoint to your quantum node (e.g., Render or Ngrok URL).</p>
      </div>

      <button id="saveBtn" class="w-full bg-emerald-500 hover:bg-emerald-400 text-gray-950 font-bold py-3 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-emerald-300 shadow-[0_0_15px_rgba(52,211,153,0.3)]">
        Save Configuration
      </button>

      <div id="status" class="hidden text-sm text-center font-medium py-2 rounded">
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
