<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GHOST HAND</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Outfit',sans-serif;color:#fff}
#wrap{position:relative;width:100vw;height:100vh}
#vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:.45;filter:brightness(.7) saturate(1.3)}
#c{position:absolute;inset:0;width:100%;height:100%}

#hud{position:absolute;top:20px;left:20px;z-index:9;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.card{background:rgba(0,0,0,.6);border:1px solid rgba(0,255,200,.2);border-radius:12px;padding:10px 16px;min-width:160px;backdrop-filter:blur(8px)}
.lbl{font-size:10px;letter-spacing:3px;color:rgba(0,255,200,.6);text-transform:uppercase;margin-bottom:3px}
.val{font-size:20px;font-weight:700;line-height:1.1}
.bar-bg{height:4px;background:rgba(255,255,255,.1);border-radius:4px;margin-top:6px}
.bar-fg{height:100%;width:0;background:linear-gradient(90deg,#00ffe0,#ff00aa);border-radius:4px;transition:width .08s}

#badge{position:absolute;bottom:28px;right:28px;z-index:9;background:rgba(0,0,0,.6);border:1px solid rgba(255,0,170,.3);border-radius:40px;padding:8px 20px;font-size:12px;letter-spacing:2px;font-weight:600;color:#ff00aa;backdrop-filter:blur(8px);text-transform:uppercase}

#loading{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000}
#loading h2{font-size:22px;font-weight:700;letter-spacing:5px;background:linear-gradient(90deg,#00ffe0,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#loading p{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:2px}
.ring{width:44px;height:44px;border:2px solid rgba(0,255,224,.15);border-top-color:#00ffe0;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#flash{position:absolute;inset:0;z-index:8;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,rgba(255,0,170,.3),transparent 70%)}
</style>
</head>
<body>
<div id="wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="c"></canvas>
  <div id="flash"></div>

  <div id="hud">
    <div class="card"><div class="lbl">Hands</div><div class="val" id="vHands">0</div></div>
    <div class="card"><div class="lbl">Gesture</div><div class="val" id="vGesture">—</div></div>
    <div class="card">
      <div class="lbl">Spread</div><div class="val" id="vSpread">0%</div>
      <div class="bar-bg"><div class="bar-fg" id="vBar"></div></div>
    </div>
  </div>

  <div id="badge">NO HANDS</div>

  <div id="loading">
    <div class="ring"></div>
    <h2>GHOST HAND</h2>
    <p>INITIALIZING AI ENGINE...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var vid    = document.getElementById('vid');

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
var CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];
var TIPS   = [4,8,12,16,20];
var COLORS = ['#00ffe0','#ff2fd6','#b6ff3c','#ffb020'];
var LERP   = 0.35;
var MAX_HANDS = 4;

// ─── HAND STATE ───────────────────────────────────────────────────────────────
var tracks = [];
for(var i=0;i<MAX_HANDS;i++){
  tracks.push({
    active:false, lm:null, prev:null,
    trails: [[],[],[],[],[]],   // one trail per fingertip
    vel:0, pinchLock:false,
    ring:{r:0,a:0}
  });
}

// ─── PARTICLE POOL ───────────────────────────────────────────────────────────
var POOL_SIZE = 800;
var pool = [];
for(var pi=0;pi<POOL_SIZE;pi++){
  pool.push({alive:false,x:0,y:0,vx:0,vy:0,life:0,maxLife:0,r:0,color:'#fff',spiral:false,angle:0,cx:0,cy:0,radius:0,av:0});
}
var poolCursor = 0;

// ─── JAKRAA SHOCKWAVE RINGS ───────────────────────────────────────────────────
var jakRings = [];

function triggerJakraa(x, y, col){
  // 5 concentric expanding rings
  for(var i=0;i<5;i++){
    jakRings.push({x:x,y:y,r:20+i*20,a:1,speed:14+i*5,col:col,lw:4-i*0.5});
  }
  // 80 radial sparks spread 360°
  var n=80;
  for(var i=0;i<n;i++){
    var ang=(i/n)*Math.PI*2;
    var spd=6+Math.random()*10;
    var p=pool[poolCursor];
    poolCursor=(poolCursor+1)%POOL_SIZE;
    p.alive=true; p.spiral=false;
    p.x=x; p.y=y;
    p.vx=Math.cos(ang)*spd; p.vy=Math.sin(ang)*spd;
    p.color=['#ff2200','#ff8800','#ffff00','#ff00ff','#00ffff','#fff'][Math.floor(Math.random()*6)];
    p.r=6+Math.random()*6;
    p.maxLife=0.8+Math.random()*0.6; p.life=p.maxLife;
  }
  beep(660);
}

function drawJakraa(){
  for(var i=jakRings.length-1;i>=0;i--){
    var jr=jakRings[i];
    jr.r+=jr.speed; jr.a*=0.90;
    if(jr.a<0.01){jakRings.splice(i,1);continue;}
    ctx.save();
    ctx.beginPath(); ctx.arc(jr.x,jr.y,jr.r,0,Math.PI*2);
    ctx.strokeStyle=jr.col; ctx.lineWidth=Math.max(0.5,jr.lw);
    ctx.globalAlpha=jr.a; ctx.shadowBlur=30; ctx.shadowColor=jr.col;
    ctx.stroke(); ctx.restore();
  }
}

function spawn(x,y,color,speed,spiral){
  var p = pool[poolCursor];
  poolCursor = (poolCursor+1)%POOL_SIZE;
  p.alive  = true;
  p.x=x; p.y=y;
  p.color  = color||'#fff';
  p.maxLife= 0.5 + Math.random()*0.7;
  p.life   = p.maxLife;
  p.r      = 3 + Math.random()*5;
  speed    = speed||1;
  p.spiral = spiral && Math.random()<0.55;
  if(p.spiral){
    p.cx=x; p.cy=y;
    p.angle  = Math.random()*Math.PI*2;
    p.radius = 2 + Math.random()*12;
    p.av     = (Math.random()<0.5?1:-1)*(8+Math.random()*6);
    p.vy     = -(Math.random()*0.8+0.2)*speed;
    p.vx     = 0;
  } else {
    var a = Math.random()*Math.PI*2;
    var s = (1+Math.random()*2)*speed;
    p.vx = Math.cos(a)*s;
    p.vy = Math.sin(a)*s - s*0.3;
  }
}

function burst(x,y,color,n){
  for(var i=0;i<n;i++) spawn(x,y,color,3+Math.random()*2,Math.random()<0.5);
  for(var i=0;i<n/2;i++) spawn(x,y,'#fff',2,false);
}

function updateParticles(dt){
  for(var i=0;i<POOL_SIZE;i++){
    var p=pool[i];
    if(!p.alive) continue;
    p.life-=dt;
    if(p.life<=0){p.alive=false;continue;}
    if(p.spiral){
      p.angle+=p.av*dt;
      p.radius*=1.015;
      p.x=p.cx+Math.cos(p.angle)*p.radius;
      p.y=p.cy+Math.sin(p.angle)*p.radius*0.6;
      p.cy+=p.vy;
    } else {
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.06; p.vx*=0.96;
    }
  }
}

function drawParticles(){
  for(var i=0;i<POOL_SIZE;i++){
    var p=pool[i];
    if(!p.alive) continue;
    var t=p.life/p.maxLife;
    var alpha=t*t;
    var r=p.r*t;
    ctx.save();
    ctx.globalAlpha=alpha*0.9;
    var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r*2.5);
    g.addColorStop(0,p.color);
    g.addColorStop(0.4,p.color+'99');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(p.x,p.y,r*2.5,0,Math.PI*2);
    ctx.fill();
    // bright dot core
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(p.x,p.y,r*0.4,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── LIGHTNING ────────────────────────────────────────────────────────────────
function lightning(x1,y1,x2,y2,col,segs,jit){
  segs=segs||10; jit=jit||20;
  var pts=[{x:x1,y:y1}];
  for(var i=1;i<segs;i++){
    var t=i/segs;
    pts.push({
      x:x1+(x2-x1)*t+(Math.random()-.5)*jit*2,
      y:y1+(y2-y1)*t+(Math.random()-.5)*jit
    });
  }
  pts.push({x:x2,y:y2});
  // outer glow
  ctx.save();
  ctx.shadowBlur=18; ctx.shadowColor=col;
  ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.globalAlpha=0.7;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  // white core
  ctx.shadowBlur=4; ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.globalAlpha=0.9;
  ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
  ctx.restore();
}

// ─── GESTURE DETECTION ───────────────────────────────────────────────────────
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function gesture(lm){
  var wrist=lm[0], mid=lm[9];
  var sz=Math.max(0.05,dist(wrist,mid));
  var pinch=dist(lm[4],lm[8])/sz;
  if(pinch<0.32) return 'PINCH';
  var ext=[
    dist(lm[4],wrist)>dist(lm[3],wrist),
    dist(lm[8],wrist)>dist(lm[6],wrist),
    dist(lm[12],wrist)>dist(lm[10],wrist),
    dist(lm[16],wrist)>dist(lm[14],wrist),
    dist(lm[20],wrist)>dist(lm[18],wrist)
  ];
  var cnt=ext[1]+ext[2]+ext[3]+ext[4];
  if(cnt===0) return 'FIST';
  if(ext[1]&&ext[2]&&!ext[3]&&!ext[4]) return 'PEACE';
  if(cnt>=3) return 'OPEN';
  return 'POINT';
}

function spread(lm){
  var wrist=lm[0],mid=lm[9];
  var sz=Math.max(0.05,dist(wrist,mid));
  var d=dist(lm[8],lm[20])/sz;
  return Math.max(0,Math.min(100,((d-0.25)/1.1)*100));
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
var elHands   = document.getElementById('vHands');
var elGesture = document.getElementById('vGesture');
var elSpread  = document.getElementById('vSpread');
var elBar     = document.getElementById('vBar');
var elBadge   = document.getElementById('badge');
var elFlash   = document.getElementById('flash');
var flashTimer= 0;
var audioCtx  = null;

function beep(freq){
  try{
    audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
    var o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.001,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2,audioCtx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.18);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+0.2);
  }catch(e){}
}

function updateHUD(activeTracks){
  elHands.textContent = activeTracks.length;
  if(!activeTracks.length){
    elGesture.textContent='—'; elSpread.textContent='0%';
    elBar.style.width='0%'; elBadge.textContent='NO HANDS'; return;
  }
  var t=activeTracks[0];
  var g=gesture(t.lm);
  var s=spread(t.lm);
  elGesture.textContent=g;
  elSpread.textContent=Math.round(s)+'%';
  elBar.style.width=s+'%';
  elBadge.textContent=activeTracks.map(function(tt){return gesture(tt.lm);}).join(' | ');

  if(g==='PINCH'&&!t.pinchLock){
    t.pinchLock=true;
    elFlash.style.opacity='1';
    flashTimer=0.3;
    beep(880);
    var mx=(t.lm[4].x+t.lm[8].x)/2*canvas.width;
    var my=(t.lm[4].y+t.lm[8].y)/2*canvas.height;
    burst(mx,my,COLORS[0],50);
  } else if(g!=='PINCH'){
    t.pinchLock=false;
  }
}

// ─── DRAW HAND ────────────────────────────────────────────────────────────────
var TRAIL_LEN=28;
var BOLT_COLS=['#ff4400','#ffaa00','#ffff00','#ff00ff','#00ffff'];

function drawHands(activeTracks){
  var W=canvas.width, H=canvas.height;

  activeTracks.forEach(function(t,idx){
    var lm=t.lm;
    var col=COLORS[idx%COLORS.length];
    var vel=t.vel;

    // screen coords
    var px=lm.map(function(p){return{x:p.x*W,y:p.y*H};});

    // skeleton lines
    ctx.save();
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.shadowBlur=10; ctx.shadowColor=col; ctx.globalAlpha=0.88;
    CONNECTIONS.forEach(function(ab){
      ctx.beginPath();
      ctx.moveTo(px[ab[0]].x,px[ab[0]].y);
      ctx.lineTo(px[ab[1]].x,px[ab[1]].y);
      ctx.stroke();
    });
    ctx.restore();

    // fingertip circles + white dot
    TIPS.forEach(function(ti){
      var p=px[ti];
      var r=10+vel*6;
      ctx.save();
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2.5;
      ctx.shadowBlur=14; ctx.shadowColor=col; ctx.globalAlpha=0.95;
      ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='#fff'; ctx.shadowBlur=10; ctx.globalAlpha=1;
      ctx.fill();
      ctx.restore();
    });

    // motion trails per fingertip
    TIPS.forEach(function(ti,fi){
      var p=px[ti];
      var arr=t.trails[fi];
      arr.push({x:p.x,y:p.y});
      if(arr.length>TRAIL_LEN) arr.shift();
      if(arr.length<2) return;
      ctx.save();
      for(var i=1;i<arr.length;i++){
        var a=(i/arr.length)*0.8;
        var lw=(i/arr.length)*6;
        ctx.beginPath();
        ctx.moveTo(arr[i-1].x,arr[i-1].y);
        ctx.lineTo(arr[i].x,arr[i].y);
        ctx.strokeStyle=col; ctx.lineWidth=lw;
        ctx.globalAlpha=a; ctx.shadowBlur=12; ctx.shadowColor=col;
        ctx.stroke();
      }
      ctx.restore();
    });

    // palm pulse ring
    var ring=t.ring;
    if(vel>0.4){ring.r=0;ring.a=1;}
    if(ring.a>0.01){
      ctx.save();
      ctx.beginPath(); ctx.arc(px[9].x,px[9].y,ring.r,0,Math.PI*2);
      ctx.strokeStyle=col; ctx.lineWidth=2.5;
      ctx.globalAlpha=ring.a; ctx.shadowBlur=16; ctx.shadowColor=col;
      ctx.stroke(); ctx.restore();
      ring.r+=5; ring.a*=0.86;
    }

    // spawn particles at fingertips — EXPONENTIAL velocity scaling
    var velClamped = Math.min(t.vel, 6);
    // base 4 particles, up to 60+ at full speed
    var spawnN = Math.ceil(4 + Math.pow(velClamped, 2.2) * 2);
    TIPS.forEach(function(ti,fi){
      var p2=px[ti];
      for(var k=0;k<spawnN;k++){
        spawn(p2.x,p2.y,COLORS[(fi+idx*2)%COLORS.length],1+velClamped*0.7,true);
      }
      if(velClamped>1.8){
        var flashes=Math.floor((velClamped-1.8)*5);
        for(var k=0;k<flashes;k++) spawn(p2.x,p2.y,'#fff',velClamped*0.8,false);
      }
    });
    // skeleton particle spray when moving
    if(velClamped>1.2){
      CONNECTIONS.forEach(function(ab){
        if(Math.random()<0.35){
          var t2=Math.random();
          var bx2=px[ab[0]].x+(px[ab[1]].x-px[ab[0]].x)*t2;
          var by2=px[ab[0]].y+(px[ab[1]].y-px[ab[0]].y)*t2;
          spawn(bx2,by2,COLORS[idx%COLORS.length],velClamped*0.5,false);
        }
      });
    }
  });

  // cross-hand lightning + inter-hand particles
  if(activeTracks.length>=2){
    var lmA=activeTracks[0].lm;
    var lmB=activeTracks[1].lm;

    TIPS.forEach(function(ti,fi){
      var ax=lmA[ti].x*W, ay=lmA[ti].y*H;
      var bx=lmB[ti].x*W, by=lmB[ti].y*H;
      lightning(ax,ay,bx,by,BOLT_COLS[fi],10,18);

      // fire particles along each bolt
      for(var k=0;k<6;k++){
        var t=Math.random();
        var px2=ax+(bx-ax)*t, py2=ay+(by-ay)*t;
        var fireCol=['#ff2200','#ff6600','#ffcc00','#ff44aa','#ffffff'][Math.floor(Math.random()*5)];
        spawn(px2,py2,fireCol,1.2,false);
      }
    });

    // palm-to-palm big arc
    var pax=lmA[9].x*W, pay=lmA[9].y*H;
    var pbx=lmB[9].x*W, pby=lmB[9].y*H;
    lightning(pax,pay,pbx,pby,'#fff',14,32);

    // fill energy field between palms
    for(var k=0;k<10;k++){
      var tx=Math.random(),ty=Math.random();
      var fx2=pax+(pbx-pax)*tx+(Math.random()-.5)*80;
      var fy2=pay+(pby-pay)*ty+(Math.random()-.5)*80;
      spawn(fx2,fy2,BOLT_COLS[Math.floor(Math.random()*5)],0.8,true);
    }
  }
}

// ─── MEDIAPIPE ────────────────────────────────────────────────────────────────
var smoothed = [];   // [handIdx][lmIdx] = {x,y,z}
var seenThis = [];

var mpHands = new Hands({
  locateFile:function(f){return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/'+f;}
});
mpHands.setOptions({
  maxNumHands:MAX_HANDS,
  modelComplexity:1,
  minDetectionConfidence:0.55,
  minTrackingConfidence:0.5,
  selfieMode:true
});

mpHands.onResults(function(res){
  document.getElementById('loading').style.display='none';
  var incoming=res.multiHandLandmarks||[];

  // simple index-based assignment (stable within a run)
  var n=Math.min(incoming.length,MAX_HANDS);

  // deactivate all first
  for(var s=0;s<MAX_HANDS;s++) tracks[s].active=false;

  for(var i=0;i<n;i++){
    var raw=incoming[i];
    var t=tracks[i];
    t.active=true;

    // lerp smoothing
    if(!smoothed[i]){
      smoothed[i]=raw.map(function(p){return{x:p.x,y:p.y,z:p.z||0};});
    } else {
      for(var j=0;j<21;j++){
        smoothed[i][j].x+=(raw[j].x-smoothed[i][j].x)*LERP;
        smoothed[i][j].y+=(raw[j].y-smoothed[i][j].y)*LERP;
        smoothed[i][j].z+=((raw[j].z||0)-smoothed[i][j].z)*LERP;
      }
    }

    // velocity and spin detection
    if(t.prev){
      var spd=0;
      for(var j=0;j<21;j++) spd+=Math.hypot(smoothed[i][j].x-t.prev[j].x,smoothed[i][j].y-t.prev[j].y);
      t.vel=Math.min(6,spd*30);

      // ── SPIN DETECTION: measure rotation of index-finger vector around wrist ──
      // vector from wrist(0) to middle-knuckle(9)
      var dx1=smoothed[i][9].x-smoothed[i][0].x;
      var dy1=smoothed[i][9].y-smoothed[i][0].y;
      var curAngle=Math.atan2(dy1,dx1);

      if(typeof t.lastAngle==='number'){
        var delta=curAngle-t.lastAngle;
        // wrap to [-PI,PI]
        if(delta>Math.PI)  delta-=Math.PI*2;
        if(delta<-Math.PI) delta+=Math.PI*2;
        t.spinAcc=(t.spinAcc||0)*0.7+Math.abs(delta)*0.3;

        // fire jakraa on spin OR on sudden velocity spike
        var velSpike = t.vel>3.5 && (t.prevVel||0)<2;
        if((t.spinAcc>0.06 || velSpike) && !t.spinCooldown){
          var W2=canvas.width;
          var px9=smoothed[i][9].x*W2, py9=smoothed[i][9].y*canvas.height;
          triggerJakraa(px9,py9,COLORS[i%COLORS.length]);
          t.spinCooldown=true;
          t.spinAcc=0;
          (function(track){setTimeout(function(){track.spinCooldown=false;},500);})(t);
        }
      }
      t.prevVel = t.vel;
      t.lastAngle=curAngle;
    }
    t.prev=smoothed[i].map(function(p){return{x:p.x,y:p.y,z:p.z};});
    t.lm=smoothed[i];
  }

  // clear smoothed for slots beyond current hand count
  if(smoothed.length>n) smoothed.length=n;
});

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
var last=performance.now();

function loop(){
  requestAnimationFrame(loop);
  var now=performance.now();
  var dt=Math.min(0.05,(now-last)/1000);
  last=now;

  // flash decay
  if(flashTimer>0){
    flashTimer-=dt;
    if(flashTimer<=0) elFlash.style.opacity='0';
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);

  var activeTracks=tracks.filter(function(t){return t.active&&t.lm;});
  updateHUD(activeTracks);
  drawHands(activeTracks);
  drawJakraa();        // always draw rings even after hand leaves
  updateParticles(dt);
  drawParticles();
}
loop();

// ─── CAMERA START ────────────────────────────────────────────────────────────
(async function(){
  try{
    var cam=new Camera(vid,{
      onFrame:async function(){await mpHands.send({image:vid});},
      width:960,height:540
    });
    await cam.start();
  } catch(e){
    document.getElementById('loading').innerHTML='<p style="color:#ff4444;font-size:14px;letter-spacing:2px">CAMERA ERROR — allow access &amp; reload</p>';
    console.error(e);
  }
})();
</script>
